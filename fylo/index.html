<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css" /> 

  <title>Fylo data storage component</title>
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div id="container">
    <section>

      <div id="control-panel">
        <img id="brand" src="./images/logo.svg" />
  
        <div class="container-control-button">
          <button class="control-button" >
            <img class="control-icon" src="./images/icon-document.svg"/>
          </button> 
          <button class="control-button">
            <img class="control-icon" src="./images/icon-folder.svg" />
          </button>
          <button class="control-button">
            <img class="control-icon" src="./images/icon-upload.svg"/>
          </button>
        </div>
  
      </div>    
      <div id="status-panel">
        <div class="badge">
          <p>185 <span>GB Left</span></p>
        </div>

        <p>You’ve used <strong>815 GB</strong> of your storage</p>
        <!---->      
        <div id="container-progress-bar">

          <div id="progress-bar">
            <span></span>
          </div>          

          <div id="progress-bar-text">
            <span>0 GB</span>
            <span>1000 GB</span> 
          </div>
        </div>
      </div>
    </section>
  </div>
  
  <!--div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Gabriel R. Lima</a>.
  </div-->
</body>
</html>
