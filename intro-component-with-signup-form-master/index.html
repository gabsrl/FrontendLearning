<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">  
  <title>Frontend Mentor | Intro component with sign up form</title>

</head>
<body>
  <div class="container">
    <section class="mainSection">
      <h1>Learn to code by watching others</h1>
      <p>
        See how experienced developers solve problems in real-time. Watching scripted tutorials is great, 
        but understanding how developers think is invaluable.
      </p>
    </section>
  
    <section class="subscribeSection">
      <div class="tryItContainer">
        <p><b>Try it free 7 days</b> then $20/mo. thereafter</p>
      </div>
      <form id="form">

        <label>
        <input id="inputFname" type="text" placeholder="First Name" onchange="function change() { console.log(`aaa`)}">              
            <div id="errorFname">
              <img src="./images/icon-error.svg" />
              <span> <i>First name cannot be empty</i></span>              
            </div>
        </label>

        <label>
          <input id="inputLname" type="text" placeholder="Last Name">
          <div id="errorLname">
            <img src="./images/icon-error.svg" />
            <span> <i>Last name cannot be empty</i></span>              
          </div>
        </label>

        <label>
          <input id="inputEmail" type="email" placeholder="Email Address">
          <div id="errorEmail">
            <img src="./images/icon-error.svg" />
            <span> <i>Email name cannot be empty</i></span>              
          </div>
        </label>

        <label>
          <input id="inputPassword" type="password" placeholder="Password">
          <div id="errorPassword">
            <img src="./images/icon-error.svg" />
            <span> <i>Password name cannot be empty</i></span>              
          </div>
        </label>
        
        <button id="submitButton">Claim your free trial</button>
        <span id="termsServiceText">By clicking the button, you are agreeing to our <span>Terms and Services</span></span>     
      </form>

    </section>
  </div> 
  <script src="./script.js"></script> 
</body>
</html>
